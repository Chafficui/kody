services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "3456:3456"
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/data/kody.db
    volumes:
      - server_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3456/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3000"
    depends_on:
      - server
    env_file:
      - .env
    restart: always

volumes:
  server_data:
