services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "3456:3456"
    depends_on:
      - ollama
    environment:
      - ADMIN_EMAIL=admin@example.com
      - ADMIN_PASSWORD=changeme
      - DATABASE_PATH=/data/kody.db
      - PORT=3456
    volumes:
      - server_data:/data

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3000"
    depends_on:
      - server
    environment:
      - NEXT_PUBLIC_KODY_API_URL=http://localhost:3456

volumes:
  ollama_models:
  server_data:
